R_disk: 12500            # mi
z_max: 700               # mi
z_T: 3200                # mi  (below-cell apex depth, positive convention)
R_earth: 3959            # mi  (geographic coordinate mapping reference)

# --- MAGNETIC — T4 ---------------------------------------------------------
B0: 8.2e-6                # Tesla
M0: 8.3e-5                # T*mi^2
B_mod_amp: 0.2
mu0: 1.25663706212e-6     # H/m, true physical constant (T1)

# --- DIELECTRIC — T4 (geometry T2) -----------------------------------------
eps0: 8.854187817e-12     # F/m, true physical constant (T1)
