# ============================================================
# UDM COSMOLOGY ENGINE — udm_engine_params.yaml
# Merged v5.2α + v5.2β. Every key tagged with provenance tier.
#   T1 = empirically sourced (external instrument/survey)
#   T2 = structural framework (your model's defined geometry)
#   T3 = observational pattern match, unconfirmed
#   T4 = simulation parameter, session-derived (inferential bridge, not measured)
# See UDM_Master_Encyclopedia.md for full explanation and caveats.
# ============================================================

