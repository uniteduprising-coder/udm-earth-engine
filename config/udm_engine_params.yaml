# --- RESONANCE (LC CIRCUIT) — T4, anchored to T1 Schumann freq -------------
C_disk: 0.044              # F
C_iso: 0.071                # F
C_total: 0.115               # F
L_geo: 1.45                  # H
L_eff: 3.5242e-4             # H  -- RESOLVED by direct calculation: 1/((2*pi*25)^2 * C_total) = 3.5242e-4 exactly.
                              # v5.2alpha's 3.09e-4 was an arithmetic error, not an alternate value. Not ambiguous anymore.
omega_res: 157.08             # rad/s
f_res: 25                      # Hz  -- T1: real Schumann resonance frequency

# --- ROTOR & DRAG — T4 ------------------------------------------------------
Omega0: 2.45                  # rad/s
Omega_max: 4.9                 # rad/s  -- derived via circular reference to Z_g/E_break, see caveat
I_rot: 2.3e24                   # kg*m^2
kappa: 1.2e11
eta_shear: 0.01                  # 1/s
P_target: 3.8                     # GW
P_tolerance: 0.2                   # GW
sigma_eff: 2.5e-3                   # S/m
sigma_eff_min: 1.0e-3
sigma_eff_max: 5.0e-3

# --- UPPER HYDRO VORTEX — T4 -------------------------------------------------
