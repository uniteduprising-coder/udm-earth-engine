void_opacity: 1.0

# --- DIELECTRIC BREAKDOWN — RESOLVED PROVENANCE 2026-06-30 -----------------
# Searched basalt dielectric breakdown literature: solid/composite basalt
# breaks down at 330-780 kV/cm (33-78 kV/mm), an order of magnitude HIGHER
# than 25 kV/cm. No basalt-specific source matches 25 kV/cm.
# 25-30 kV/cm IS the standard textbook breakdown field for AIR at 1 atm.
# This constant is almost certainly a generic air-breakdown value, not a
# basalt-aether lab measurement as originally labeled. Kept at 25 for engine
# continuity but reclassified: T4 generic-physics borrow, not T1 lab spec.
E_break: 25                  # kV/cm -- see note above; verify against real basalt data before treating as material-specific
Omega_abort: 4.9                # rad/s
I_max: 1.0e6                      # cd

