name = "udm-earth-engine"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"

[placement]
mode = "smart"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"

[vars]
SERVICE_NAME = "udm-earth-engine"
GEO_API = "https://geo-api.uniteduprising.com"

[[routes]]
pattern = "earth.uniteduprising.com/*"
zone_name = "uniteduprising.com"